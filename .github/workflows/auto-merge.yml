name: Auto-Merge Jules PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # This ensures it only runs on Jules's automated PRs
    if: contains(github.event.pull_request.body, 'PR created automatically by Jules')
    steps:
      - name: Enable Auto-merge
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
