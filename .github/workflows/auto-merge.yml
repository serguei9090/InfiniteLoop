name: Auto-Merge Jules PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'PR created automatically by Jules')
    steps:
      - name: Attempt Auto-Merge
        run: |
          # This command enables auto-merge. If there are conflicts, 
          # it will stay in "Auto-merge enabled" state until conflicts are fixed.
          gh pr merge "${{ github.event.pull_request.html_url }}" --merge --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
