name: Auto-Merge Jules PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, 'PR created automatically by Jules')
    steps:
      - name: Auto-merge PR
        # Choose ONE: --squash OR --rebase OR --merge. 
        # --auto ensures it waits for checks. --admin bypasses rules if needed.
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
